<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Clone</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }

      header {
        background-color: #f1f1f1;
        padding: 10px;
        text-align: center;
      }

      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-weight: bold;
        font-size: 20px;
      }

      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
      }

      .video-player {
        width: 80%;
        margin-bottom: 20px;
      }

      .video-player video {
        width: 100%;
        height: 400px;
      }

      .video-list {
        width: 80%;
      }

      .video-list ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
      }

      .video-list li {
        margin: 10px;
        width: 30%;
      }

      .video-list img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">YouTube Clone</div>
        <input type="search" placeholder="Cari video..." />
        <button>Cari</button>
      </nav>
    </header>
    <main>
      <section class="video-player">
        <video
          src="https://www.w3schools.com/html/mov_bbb.mp4"
          controls
        ></video>
        <h2>Judul Video</h2>
        <p>Deskripsi video...</p>
      </section>
      <section class="video-list">
        <h3>Rekomendasi Video</h3>
        <ul>
          <li>
            <img src="https://picsum.photos/200/150" alt="Video 1" />
            <p>Video 1</p>
          </li>
          <li>
            <img src="https://picsum.photos/200/150" alt="Video 2" />
            <p>Video 2</p>
          </li>
          <li>
            <img src="https://picsum.photos/200/150" alt="Video 3" />
            <p>Video 3</p>
          </li>
        </ul>
      </section>
    </main>

    <script>
      document.querySelectorAll(".video-list li").forEach((item) => {
        item.addEventListener("click", () => {
          const videoSrc = item.querySelector("img").src;
          document.querySelector(".video-player video").src = videoSrc;
        });
      });
    </script>
  </body>
</html>
